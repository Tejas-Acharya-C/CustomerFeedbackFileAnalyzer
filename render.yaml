services:
  - type: web
    name: customer-feedback-analyzer
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT wsgi:app --timeout 60
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_UPLOAD_MB
        value: "5"
      - key: RATE_LIMIT_PER_MIN
        value: "60"
      - key: TRUST_PROXY_HEADERS
        value: "1"
      - key: REPORT_BRAND_NAME
        value: Customer Feedback Pulse
