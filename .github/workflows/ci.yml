name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Run benchmark
        run: python -m tests.benchmark

      - name: Security check - dependency audit
        run: pip audit --strict || echo "::warning::pip-audit found issues"
        continue-on-error: true

      - name: Verify app startup
        run: |
          python -c "
          from app import create_app
          app = create_app()
          client = app.test_client()
          res = client.get('/api/health')
          assert res.status_code == 200
          data = res.get_json()
          assert data['ok'] is True
          print('✅ App startup and health check passed')
          "

      - name: Verify all routes registered
        run: |
          python -c "
          from app import create_app
          app = create_app()
          routes = [r.rule for r in app.url_map.iter_rules() if r.rule.startswith('/api')]
          expected = ['/api/data', '/api/analyze', '/api/search', '/api/compare', '/api/health', '/api/export-summary-pdf']
          for e in expected:
              assert e in routes, f'Missing route: {e}'
          print(f'✅ All {len(expected)} API routes verified')
          "
